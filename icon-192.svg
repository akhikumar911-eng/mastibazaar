<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 240">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.45" stop-color="#C026D3"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F1235"/>
      <stop offset="1" stop-color="#0B0416"/>
    </linearGradient>
    <linearGradient id="mface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="0.55" stop-color="#F97316"/>
      <stop offset="1" stop-color="#C026D3"/>
    </linearGradient>
    <linearGradient id="mshadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C2D92"/>
      <stop offset="1" stop-color="#3B0764"/>
    </linearGradient>
  </defs>
  <!-- outer frame -->
  <rect x="4" y="4" width="184" height="184" rx="42" fill="url(#plate)" stroke="url(#frame)" stroke-width="8"/>
  <!-- bezel -->
  <rect x="14" y="14" width="164" height="164" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2.5"/>
  <!-- M shadow -->
  <path d="M46 152 V62 L78 62 L102 102 L126 62 L158 62 V152 L140 152 V94 L112 138 L92 138 L64 94 V152 Z"
        transform="translate(4,6)" fill="url(#mshadow)"/>
  <!-- M face -->
  <path d="M40 146 V56 L72 56 L96 96 L120 56 L152 56 V146 L134 146 V88 L106 132 L86 132 L58 88 V146 Z"
        fill="url(#mface)"/>
  <!-- BAZAAR text -->
  <text x="96" y="222" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-weight="900" font-size="34" letter-spacing="6" fill="url(#frame)">BAZAAR</text>
</svg>
